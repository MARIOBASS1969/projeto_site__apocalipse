<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Banda Apocalipse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
scroll-behavior:smooth;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* PARTICULAS */

#particles{
position:fixed;
width:100%;
height:100%;
background:#0b0b0b;
z-index:-1;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:999;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1200px;
margin:auto;
padding:15px;
}

.logo{
font-size:22px;
font-weight:800;
letter-spacing:2px;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

nav a:hover{
color:#ff004c;
}

/* MENU MOBILE */

.menu-btn{
display:none;
font-size:28px;
cursor:pointer;
}

.mobile-menu{
position:fixed;
top:0;
right:-100%;
width:70%;
height:100%;
background:#000;
padding:40px;
transition:.4s;
}

.mobile-menu a{
display:block;
margin:20px 0;
font-size:20px;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:70px;
letter-spacing:3px;
}

.hero p{
margin:20px 0;
font-size:18px;
}

.btn{
padding:14px 30px;
border:none;
border-radius:30px;
background:#ff004c;
color:white;
cursor:pointer;
}

/* SEÇÕES */

.section{
max-width:1200px;
margin:auto;
padding:80px 20px;
text-align:center;

opacity:0;
transform:translateY(40px);
transition:1s;
}

.section.show{
opacity:1;
transform:none;
}

.section h2{
margin-bottom:40px;
font-size:32px;
}

/* AGENDA */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#1a1a1a;
padding:25px;
border-radius:12px;
}

/* GALERIA */

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.galeria img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.galeria img:hover{
transform:scale(1.05);
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

/* PLAYER */

.player audio{
width:100%;
margin-top:20px;
}

/* FORM */

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:12px;
border:none;
border-radius:8px;
}

textarea{
height:120px;
}

/* FOOTER */

footer{
background:#000;
text-align:center;
padding:25px;
margin-top:50px;
}

/* RESPONSIVO */

@media(max-width:768px){

nav ul{
display:none;
}

.menu-btn{
display:block;
}

.hero h1{
font-size:38px;
}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<header>

<nav>

<div class="logo">APOCALIPSE</div>

<ul>
<li><a href="#sobre">Quem Somos</a></li>
<li><a href="#agenda">Agenda</a></li>
<li><a href="#galeria">Galeria</a></li>
<li><a href="#musica">Música</a></li>
<li><a href="#contato">Contato</a></li>
</ul>

<div class="menu-btn" onclick="menu()">☰</div>

</nav>

</header>

<div class="mobile-menu" id="mobile">

<a href="#sobre">Quem Somos</a>
<a href="#agenda">Agenda</a>
<a href="#galeria">Galeria</a>
<a href="#musica">Música</a>
<a href="#contato">Contato</a>

</div>

<section class="hero">

<div>

<h1>BANDA APOCALIPSE</h1>

<p>Louvor que transforma vidas</p>

<a href="#agenda"><button class="btn">Ver Agenda</button></a>

</div>

</section>

<section id="sobre" class="section">

<h2>Quem Somos</h2>

<p>A Banda Apocalipse leva esperança, fé e louvor através da música.</p>

</section>

<section id="agenda" class="section">

<h2>Agenda</h2>

<div class="grid" id="agendaLista"></div>

</section>

<section id="galeria" class="section">

<h2>Galeria</h2>

<div class="galeria">

<img src="https://images.unsplash.com/photo-1501612780327-45045538702b">
<img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2">
<img src="https://images.unsplash.com/photo-1497032628192-86f99bcd76bc">
<img src="https://images.unsplash.com/photo-1518972559570-7cc1309f3229">

</div>

</section>

<section id="musica" class="section">

<h2>Música</h2>

<div class="player">

<audio controls>
<source src="musica.mp3" type="audio/mpeg">
</audio>

</div>

</section>

<section id="contato" class="section">

<h2>Contato</h2>

<form onsubmit="whats(event)">

<input type="text" id="nome" placeholder="Nome" required>

<input type="email" id="email" placeholder="Email" required>

<textarea id="msg" placeholder="Mensagem"></textarea>

<button class="btn">Enviar</button>

</form>

</section>

<footer>

<p>© 2026 Banda Apocalipse</p>

</footer>

<div class="lightbox" id="lightbox">
<img id="imgLight">
</div>

<script>

/* MENU */

function menu(){
let m=document.getElementById("mobile")
m.style.right = m.style.right=="0px" ? "-100%" : "0"
}

/* ANIMAÇÃO SCROLL */

const sections=document.querySelectorAll(".section")

window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
const top=sec.getBoundingClientRect().top
if(top<window.innerHeight-100){
sec.classList.add("show")
}
})
})

/* AGENDA */

let agenda=[
{cidade:"Salvador - BA",data:"15 Julho"},
{cidade:"Feira de Santana",data:"22 Julho"},
{cidade:"Lauro de Freitas",data:"05 Agosto"}
]

let lista=document.getElementById("agendaLista")

agenda.forEach(show=>{
lista.innerHTML+=`
<div class="card">
<h3>${show.cidade}</h3>
<p>${show.data}</p>
</div>
`
})

/* LIGHTBOX */

let imgs=document.querySelectorAll(".galeria img")
let light=document.getElementById("lightbox")
let imgLight=document.getElementById("imgLight")

imgs.forEach(img=>{
img.onclick=()=>{
light.style.display="flex"
imgLight.src=img.src
}
})

light.onclick=()=>light.style.display="none"

/* WHATSAPP */

function whats(e){

e.preventDefault()

let nome=document.getElementById("nome").value
let email=document.getElementById("email").value
let msg=document.getElementById("msg").value

let texto=`Nome:${nome}%0AEmail:${email}%0AMensagem:${msg}`

window.open(`https://wa.me/5599999999999?text=${texto}`)

}

/* PARTICULAS */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

p.y+=0.3

if(p.y>canvas.height)p.y=0
})

requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
